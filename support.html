<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>在线客服 - 易换官网</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="support">
  <main class="support-page">
    <div class="support-shell">
      <header class="support-topbar">
        <a class="support-brand" href="index.html">
          <img src="brand-logo.svg" alt="易换" />
          <span class="support-brand-copy">
            <strong>易换客服</strong>
            <span>在线服务中心</span>
          </span>
        </a>
        <div class="support-top-actions">
          <span class="support-status">7*24 在线客服</span>
          <a class="support-return" href="index.html">返回官网</a>
        </div>
      </header>

      <div class="support-announcement">
        <span>易换公告：</span>
        <span>客服消息、处理说明与结果确认，请以当前对话窗口为准。</span>
      </div>

      <div class="support-workbench">
        <section class="support-chat-panel">
          <div class="support-chat-canvas">
            <div class="support-chat-overlay"></div>

            <div class="support-verify-card">
              <h1>对话验证</h1>
              <p>为了更好地为您提供服务，请滑动验证开始咨询</p>
              <div class="support-slider-demo" aria-hidden="true">
                <span class="support-slider-knob">»</span>
                <span class="support-slider-label">拖动滑块</span>
              </div>
            </div>
          </div>

          <div class="support-inputbar">
            <div class="support-toolset">
              <button class="support-tool-btn" type="button" aria-label="表情">☺</button>
              <button class="support-tool-btn" type="button" aria-label="图片">🖼</button>
              <button class="support-tool-btn" type="button" aria-label="附件">📎</button>
              <button class="support-tool-btn" type="button" aria-label="收藏">★</button>
            </div>
            <label class="support-input-wrap">
              <input type="text" placeholder="验证通过后可输入问题，例如：提现多久到账？" />
            </label>
            <button class="support-send-btn" type="button">发送</button>
          </div>
        </section>

        <aside class="support-promo-rail">
          <div class="support-promo-copy">
            <span class="support-promo-brand">易换 · 您的智能汇率管家</span>
            <h2>海外换汇无忧</h2>
            <p>覆盖多币种换汇、到账结果确认与常见问题处理路径，常用场景可直接通过客服窗口快速确认。</p>
          </div>

          <div class="support-promo-stage">
            <span class="support-promo-coin coin-a">$</span>
            <span class="support-promo-coin coin-b">₿</span>
            <span class="support-promo-coin coin-c">₮</span>

            <div class="support-promo-phone">
              <div class="support-promo-phone-top"></div>
              <div class="support-promo-phone-screen">
                <div class="support-promo-search"></div>
                <div class="support-promo-banner"></div>
                <div class="support-promo-grid">
                  <span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span>
                </div>
                <div class="support-promo-panel"></div>
                <div class="support-promo-footer"></div>
              </div>
            </div>

            <span class="support-promo-badge badge-upgrade">全新升级</span>
            <span class="support-promo-badge badge-safe">安全便捷</span>
          </div>

          <a class="support-promo-btn" href="index.html#download">立即体验</a>
        </aside>
      </div>
    </div>
  </main>

  <script src="site.js"></script>
</body>
</html>
